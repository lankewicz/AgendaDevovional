        const App = () => {
            const [dataRaw, setDataRaw] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState("");
            const [selectedYear, setSelectedYear] = useState("");
            const [theme, setTheme] = useState("blue");
            const [isGenerating, setIsGenerating] = useState(false);
            const [editMode, setEditMode] = useState(null); // { dayIdx, field }
            const previewRef = useRef(null);

            // Carregar dados (Simulado ou Fetch)
            useEffect(() => {
                // Tenta carregar do arquivo local se disponível, senão usa o embutido
                fetch('agenda.json')
                    .then(res => res.json())
                    .then(data => setDataRaw(data))
                    .catch(() => {
                        console.warn("agenda.json não encontrado. Use o link do chat ou coloque o arquivo no mesmo diretório.");
                        // Aqui o modelo inserirá os dados completos via injeção de texto ou fallback
                        setDataRaw(FALLBACK_DATA); 
                    });
            }, []);

            // Agrupar meses/anos disponíveis
            const availableOptions = useMemo(() => {
                const options = {};
                dataRaw.forEach(item => {
                    const parts = item.data.split(' de ');
                    if (parts.length === 3) {
                        const mes = parts[1];
                        const ano = parts[2];
                        if (!options[ano]) options[ano] = new Set();
                        options[ano].add(mes);
                    }
                });
                
                const years = Object.keys(options).sort();
                if (years.length > 0 && !selectedYear) {
                    setSelectedYear(years[years.length - 1]);
                    const months = Array.from(options[years[years.length - 1]]);
                    setSelectedMonth(months[months.length - 1]);
                }
                return options;
            }, [dataRaw]);

            // Filtrar dias do mês selecionado
            const currentMonthDays = useMemo(() => {
                if (!selectedMonth || !selectedYear) return [];
                return dataRaw.filter(item => item.data.includes(`${selectedMonth} de ${selectedYear}`));
            }, [selectedMonth, selectedYear, dataRaw]);

            // Lógica de Booklet (Mesmo de dezembro.html, mas dinâmico)
            const bookletSheets = useMemo(() => {
                if (currentMonthDays.length === 0) return [];
                
                const pages = [{ tipo: 'capa' }];
                currentMonthDays.forEach(d => {
                    // Extrair apenas o número do dia e dia da semana
                    const parts = d.data.split(' de ');
                    const diaNum = parts[0];
                    const diaSemana = d.diaSemana || "Dia"; // Se não tiver, precisaria calcular
                    pages.push({ tipo: 'dia', dados: { ...d, diaNum, diaSemana } });
                });
                pages.push({ tipo: 'contracapa' });

                while (pages.length % 4 !== 0) pages.push({ tipo: 'branco' });

                const sheets = [];
                const total = pages.length;
                for (let i = 0; i < total / 2; i += 2) {
                    sheets.push({ esquerda: pages[total - 1 - i], direita: pages[i] });
                    sheets.push({ esquerda: pages[i + 1], direita: pages[total - 2 - i] });
                }
                return sheets;
            }, [currentMonthDays]);

            const generatePDF = async () => {
                setIsGenerating(true);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('l', 'mm', 'a4');
                const sheets = previewRef.current.querySelectorAll('.page-container');
                
                for (let i = 0; i < sheets.length; i++) {
                    if (i > 0) pdf.addPage();
                    const canvas = await html2canvas(sheets[i], { scale: 2, useCORS: true });
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 297, 210);
                }
                pdf.save(`Agenda_${selectedMonth}_${selectedYear}.pdf`);
                setIsGenerating(false);
            };

                            <div className={`${c.primary} text-white p-6 flex justify-between items-center`}>
                                <div>
                                    <p className="text-xs uppercase tracking-tighter opacity-80">{dados.diaSemana || "Dia"}</p>
                                    <h3 className="text-2xl font-bold">{dados.diaNum}</h3>
                                </div>
                                <span className="text-sm font-serif italic opacity-70">{selectedMonth}</span>
                            </div>
                            <div className="flex-1 p-8 space-y-6">
                                <section>
                                    <h4 className={`text-[10px] font-bold uppercase tracking-widest ${c.text} mb-2`}>Reflexão</h4>
                                    <p className="text-sm text-slate-700 leading-relaxed font-sans">{dados.mensagem}</p>
                                </section>
                                <section className={`${c.light} p-4 rounded-xl border-l-4 ${c.border}`}>
                                    <h4 className={`text-[10px] font-bold uppercase tracking-widest ${c.text} mb-2`}>Palavra</h4>
                                    <p className="text-xs italic text-slate-800 font-serif mb-2 leading-relaxed">"{dados.versiculo}"</p>
                                    <p className={`text-[10px] font-bold ${c.text}`}>{dados.referencia}</p>
                                </section>
                                <section className="flex-1">
                                    <h4 className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Anotações</h4>
                                    <div className="space-y-4 pt-2">
                                        {[1,2,3,4,5].map(i => <div key={i} className="border-b border-slate-100 h-1"></div>)}
                                    </div>
                                </section>
                            </div>
                        </div>
                    );
                }

                return <div className="w-full h-full bg-white"></div>;
            };

            return (
                <div className="flex h-screen w-full">
                    
                    {/* SIDEBAR */}
                    <aside className="w-80 glass-panel z-10 flex flex-col p-6 shadow-2xl">
                        <div className="mb-10">
                            <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-rose-600">Devocional Pro</h1>
                            <p className="text-xs text-slate-400 uppercase tracking-widest font-semibold mt-1">Gerador de Agenda</p>
                        </div>

                        <div className="space-y-6 flex-1 scroll-hide overflow-y-auto">
                            {/* Seleção de Data */}
                            <div>
                                <label className="text-[10px] font-bold uppercase text-slate-500 mb-2 block">Período</label>
                                <div className="grid grid-cols-2 gap-2">
                                    <select 
                                        value={selectedYear} 
                                        onChange={(e) => setSelectedYear(e.target.value)}
                                        className="bg-white border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 ring-blue-500/20"
                                    >
                                        {Object.keys(availableOptions).map(y => <option key={y} value={y}>{y}</option>)}
                                    </select>
                                    <select 
                                        value={selectedMonth} 
                                        onChange={(e) => setSelectedMonth(e.target.value)}
                                        className="bg-white border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 ring-blue-500/20"
                                    >
                                        {selectedYear && Array.from(availableOptions[selectedYear] || []).map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                            </div>

                            {/* Seleção de Tema */}
                            <div>
                                <label className="text-[10px] font-bold uppercase text-slate-500 mb-2 block">Tema Visual</label>
                                <div className="flex gap-2">
                                    {Object.keys(themeColors).map(t => (
                                        <button 
                                            key={t}
                                            onClick={() => setTheme(t)}
                                            className={`w-8 h-8 rounded-full ${themeColors[t].primary} border-2 ${theme === t ? 'border-slate-900 scale-110' : 'border-transparent'} transition-all`}
                                        />
                                    ))}
                                </div>
                            </div>

                            {/* Instruções */}
                            <div className="bg-slate-50 rounded-xl p-4 border border-slate-100">
                                <h4 className="text-xs font-bold mb-3 flex items-center gap-2">
                                    <span className="text-blue-500">ℹ</span> Guia de Impressão
                                </h4>
                                <ul className="text-[11px] space-y-2 text-slate-600">
                                    <li className="flex gap-2"><span>1.</span><span>Gere o PDF no formato <b>Paisagem (A4)</b>.</span></li>
                                    <li className="flex gap-2"><span>2.</span><span>Imprima <b>Frente e Verso</b> (Borda Curta).</span></li>
                                    <li className="flex gap-2"><span>3.</span><span>Dobre as folhas ao meio para formar o livreto.</span></li>
                                </ul>
                            </div>
                        </div>

                        <button 
                            onClick={generatePDF}
                            disabled={isGenerating || currentMonthDays.length === 0}
                            className={`mt-6 w-full py-4 rounded-2xl font-bold text-white shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 ${isGenerating ? 'bg-slate-400' : 'bg-slate-900 hover:bg-black'}`}
                        >
                            {isGenerating ? <span className="loader !w-5 !h-5 !border-2"></span> : <span>📄 Baixar Agenda</span>}
                        </button>
                    </aside>

                    {/* MAIN CONTENT / PREVIEW */}
                    <main className="flex-1 bg-slate-200 overflow-y-auto p-12 scroll-hide">
                        <div className="max-w-screen-xl mx-auto">
                            <div className="mb-8 flex justify-between items-end">
                                <div>
                                    <h2 className="text-3xl font-bold text-slate-800">Visualização do Livreto</h2>
                                    <p className="text-slate-500">Cada quadro abaixo representa uma folha A4 (2 páginas)</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-4xl font-black text-slate-300">{currentMonthDays.length}</span>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Dias Mapeados</p>
                                </div>
                            </div>

                            <div ref={previewRef} className="preview-scale flex flex-col items-center gap-16 pb-32">
                                {bookletSheets.length > 0 ? (
                                    bookletSheets.map((sheet, idx) => (
                                        <div key={idx} className="page-container shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] flex">
                                            <div className="w-1/2 h-full border-r border-slate-100">
                                                <PageContent page={sheet.esquerda} />
                                            </div>
                                            <div className="w-1/2 h-full">
                                                <PageContent page={sheet.direita} />
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="h-96 flex flex-col items-center justify-center text-slate-400">
                                        <div className="text-6xl mb-4">📅</div>
                                        <p className="font-semibold">Selecione um mês válido para visualizar</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* OVERLAY GENERATING */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white">
                            <span className="loader mb-6"></span>
                            <h3 className="text-2xl font-bold">Renderizando PDF de Alta Qualidade</h3>
                            <p className="opacity-70 mt-2">Isso pode levar alguns segundos...</p>
                        </div>
                    )}
                </div>
            );
        };

        // Fallback data para garantir que o usuário veja algo se o fetch falhar
        const FALLBACK_DATA = [
            { data: "01 de Dezembro de 2025", diaSemana: "Segunda-feira", mensagem: "Inicie o último mês do ano entregando seus planos a Deus.", versiculo: "Porque eu bem sei os pensamentos que penso de vós...", referencia: "Jeremias 29:11" },
            { data: "02 de Dezembro de 2025", diaSemana: "Terça-feira", mensagem: "Em meio à correria de fim de ano, escolha focar no que é eterno.", versiculo: "Pensai nas coisas que são de cima e não nas que são da terra;", referencia: "Colossenses 3:2" },
            { data: "25 de Dezembro de 2025", diaSemana: "Quinta-feira", mensagem: "Feliz Natal! O Verbo se fez carne.", versiculo: "E o Verbo se fez carne e habitou entre nós...", referencia: "João 1:14" },
            { data: "01 de Janeiro de 2026", diaSemana: "Quinta-feira", mensagem: "Feliz Ano Novo! Deus é especialista em novos começos.", versiculo: "Eis que faço uma coisa nova...", referencia: "Isaías 43:19" },
            { data: "05 de Abril de 2026", diaSemana: "Domingo", mensagem: "(Páscoa) A morte não pôde detê-Lo! Celebre a vida.", versiculo: "Ele não está aqui, porque já ressuscitou...", referencia: "Mateus 28:6" }
        ];

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
